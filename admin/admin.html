<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Administración - Vení Guapa</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>

    <script>
        // Verificar si el usuario está autorizado, si no, redirigir al login
        if (sessionStorage.getItem("autorizado") !== "true") {
        window.location.href = "login.html";
        }
    </script>

    <h1>Panel de Administración</h1>

    <form id="formProducto">
    <label>Nombre del producto:</label>
    <input type="text" id="nombre" required>

    <label>Precio:</label>
    <input type="text" id="precio" required>

    <label for="categoria">Categoría:</label>
    <select id="categoria" required>
        <option value="" disabled selected>Seleccionar categoría</option>
    </select>

    <label>Imagen:</label>
    <input type="file" id="imagen" accept="image/*" required>
    
    <div id="preview-container" style="margin-top:1rem; text-align:center;">
    <img id="preview-img" src="" alt="Vista previa" 
        style="max-width: 200px; max-height: 200px; display:none; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1);" />
    </div>

    <button type="submit">Agregar producto</button>
    </form>

    <section class="panel-categorias">
        <h2>Gestión de categorías</h2>
        <div class="panel-categorias__grid">
            <form id="formCategoria" class="form-categoria">
                <div class="form-categoria__row">
                    <input type="text" id="nuevaCategoria" placeholder="Escribí la nueva categoría" required />
                    <button type="submit">Agregar</button>
                </div>
            </form>

            <div class="lista-categorias">
                <ul id="listaCategorias"></ul>
            </div>
        </div>
    </section>

    <div class="filtro filtro--below">
        <label for="filtroCategoria">Filtrar por categoría:</label>
        <select id="filtroCategoria">
            <option value="todas">Todas</option>
        </select>
    </div>

    <div class="productos" id="listaProductos"></div>

    <div id="toast-root" class="toast-root" aria-live="polite"></div>

    <div id="confirm-modal" class="confirm-modal" aria-hidden="true">
        <div class="confirm-dialog">
            <p id="confirm-message"></p>
            <div class="confirm-actions">
                <button type="button" class="btn-secondary" data-confirm="cancel">Cancelar</button>
                <button type="button" class="btn-primary" data-confirm="accept">Continuar</button>
            </div>
        </div>
    </div>

    <script>
const inputImagen = document.getElementById("imagen");
const previewImg = document.getElementById("preview-img");

inputImagen.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
            previewImg.src = event.target.result;
            previewImg.style.display = "inline-block";
        };
        reader.readAsDataURL(file);
    } else {
        previewImg.src = "";
        previewImg.style.display = "none";
    }
});
</script>

    <script type="module" src="admin.js"></script>
</body>
</html>
